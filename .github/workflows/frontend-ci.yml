name: Frontend CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4

        with:
          node-version: 22

      - run: npm install

        working-directory: frontend

      - run: npm run build

        working-directory: frontend

      - run: npm test

        working-directory: frontend
